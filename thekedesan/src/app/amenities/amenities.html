<section class="amenities d-flex align-items-center justify-content-center">
 <div class="row align-items-center g-0">
    <div class="col-md-12 mb-4 mb-md-0">
   <h1 class="title text-center mb-4">
        Comfort & Tranquility
      </h1>
      </div>
 </div>

</section>
<section class="rooms-gallery container py-5 reveal delay-1 active">
  <div class="row g-4">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let amen of amenitiesList">
      <div class="card room-card glass h-100">

        <div class="room-image-wrapper">
          <img [src]="amen.image" class="card-img-top img-fluid room-image" alt="{{ amen.name }}" />

        </div>

        <div class="card-body d-flex flex-column justify-content-center">
          <h3 class="card-title text-center">{{ amen.name }}</h3>
        </div>
      </div>
    </div>
  </div>
</section>
